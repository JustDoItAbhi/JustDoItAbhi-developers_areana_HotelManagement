spring.application.name=payment-service
server.port=8083
spring.strip.privateKey=${KEY:mock}
spring.after.payment.url=${REDIRECT:http://localhost:3000/booking-history}

spring.datasource.url=jdbc:mysql://localhost:3306/paymentservice?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=bunty
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JPA / HIBERNATE
# ===============================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.acks=all

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer

spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.json.add.type.headers: false


#spring.json.type.mapping: booking-created:com.common.events.BookingCreatedEvent
#auto-offset-reset: earliest
#enable-auto-commit: false
#listener:ack-mode: manual
webhook-secret:${WEBHOOK}
# After Payment Redirect URL
after:
payment:
url: http://localhost:3000/payment-success
