spring.application.name=payment-service
server.port=8083
spring.strip.privateKey=${KEY}
#spring.after.payment.url=${REDIRECT:http://localhost:3000/booking-history}

spring.datasource.url=jdbc:mysql://localhost:3306/paymentservice?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


#spring.datasource.password=${DB_PASS}
#spring.mail.username=${EMAIL}
#spring.mail.password=${EMAIL_PASS}
spring.datasource.password=${DB_PASS}
spring.mail.username=${EMAIL}
spring.mail.password=${EMAIL_PASS}
# JPA / HIBERNATE
# ===============================
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.acks=all


spring.json.add.type.headers: false
app.mail.enabled=true
spring.mail.host=smtp.gmail.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.port=587
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

stripe.webhook.secret:${WEBHOOK}

spring.kafka.listener.ack-mode=MANUAL_IMMEDIATE
#spring.kafka.consumer.enable-auto-commit=false
#spring.kafka.consumer.properties.spring.json.trusted.packages=*
after:
payment:
spring.after.payment.url: http://localhost:9000/api/bookings/

spring.redis.host=localhost
spring.redis.port=6379


management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true