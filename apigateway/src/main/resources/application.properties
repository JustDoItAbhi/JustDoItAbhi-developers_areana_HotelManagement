# API Gateway Configuration
spring.application.name=apigateway
server.port=9000

# Disable Eureka completely for now
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# JWT Configuration
spring.jwt.secretkey=ThisIsMySuperSecretJwtKeyForAuthentication2026Secure
spring.jwt.expiry=86400000

logging.level.org.springframework.cloud.gateway=TRACE

# Public Routes
app.jwt.public-routes=/api/users/register,/api/users/login,/api/auth/**,/actuator/health,/fallback/**

# Gateway Routes - Using direct URLs
spring.cloud.gateway.routes[0].id=user-service-public
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/register,/api/users/login
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE


spring.cloud.gateway.routes[1].id=hotel-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/hotels/**
spring.cloud.gateway.routes[1].uri=lb://HOTEL-SERVICE
spring.cloud.gateway.routes[1].filters[0]=Authentication


spring.cloud.gateway.routes[2].id=booking-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/bookings/**
spring.cloud.gateway.routes[2].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.routes[2].filters[0]=Authentication


spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/payments/**
spring.cloud.gateway.routes[3].uri=lb://payment-service
spring.cloud.gateway.routes[3].filters[0]=Authentication


spring.cloud.gateway.routes[4].id=inventory-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/inventory/**
spring.cloud.gateway.routes[4].uri=lb://inventory-service
spring.cloud.gateway.routes[4].filters[0]=Authentication


spring.cloud.gateway.routes[5].id=location-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/location/**
spring.cloud.gateway.routes[5].uri=lb://LOCATION-SERVICE
spring.cloud.gateway.routes[5].filters[0]=Authentication


spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].filters[0]=Authentication


spring.cloud.gateway.routes[7].id=user-service-protected
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[7].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[7].filters[0]=Authentication

# CORS Configuration
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173,http://127.0.0.1:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true



management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true