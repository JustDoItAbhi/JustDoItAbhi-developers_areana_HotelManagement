spring.application.name=apigateway
server.port=8080
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
spring.cloud.compatibility-verifier.enabled=true
eureka.instance.prefer-ip-address=true


logging.level.com.netflix.discovery=DEBUG
logging.level.com.netflix.eureka=DEBUG

spring.cloud.gateway.routes[0].id=locationservice
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/location/**
spring.cloud.gateway.routes[0].uri=lb://locationservice

spring.cloud.gateway.routes[1].id=hotel-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/hotel/**
spring.cloud.gateway.routes[1].uri=lb://hotel-service

spring.cloud.gateway.routes[2].id=booking-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/booking/**
spring.cloud.gateway.routes[2].uri=lb://booking-service

spring.cloud.gateway.routes[3].id=payment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/pay/**
spring.cloud.gateway.routes[3].uri=lb://payment-service

spring.cloud.gateway.routes[4].id=inventory-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/inventory/**
spring.cloud.gateway.routes[4].uri=lb://inventory-service

spring.cloud.gateway.routes[5].id=user-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/user,/api/user/**
spring.cloud.gateway.routes[5].uri=lb://user-service

spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/noti/**
spring.cloud.gateway.routes[6].uri=lb://notification-service

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:5173,http://127.0.0.1:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true

spring.jwt.secretkey=ThisIsMySuperSecretJwtKeyForAuthentication2026Secure